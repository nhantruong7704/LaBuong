<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<title>Quiz: Sản Phẩm Từ Lá Buông & Môi Trường</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f8f5f0; }
.quiz-box{
    max-width:720px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    overflow:hidden;
}
.fade-slide{ animation: fadeSlide 0.4s ease; }
@keyframes fadeSlide{
    from{opacity:0; transform:translateX(20px);}
    to{opacity:1; transform:translateX(0);}
}
.option{
    border:1px solid #ddd;
    padding:10px 15px;
    border-radius:8px;
    margin-bottom:10px;
    cursor:pointer;
    transition:0.2s;
}
.option:hover{background:#f1f1f1;}
.correct{background:#d4edda;border-color:#28a745;color:#155724;}
.wrong{background:#f8d7da;border-color:#dc3545;color:#721c24;}
.timer{font-weight:600;color:#dc3545;}
.result-box{display:none;}
</style>
</head>

<body>
<div class="container my-5">
<div class="quiz-box text-center">

<h2 class="mb-3">Quiz: Sản Phẩm Lá Buông & Môi Trường</h2>

<div id="startBox">
    <input id="playerName" class="form-control mb-3" placeholder="Nhập tên của bạn..." />
    <button class="btn btn-success" onclick="startQuiz()">Bắt đầu làm quiz</button>
</div>

<div id="quizArea" style="display:none;">
    <div class="d-flex justify-content-between mb-3">
        <div id="progress" class="fw-bold"></div>
        <div>Thời gian: <span class="timer" id="time">30</span>s</div>
    </div>
    <div id="questionBox" class="mt-3 fw-bold fs-5 text-start"></div>
    <div id="optionsBox" class="mt-3 text-start"></div>
</div>

<div id="resultBox" class="result-box mt-4 alert alert-info"></div>

<a href="index.html" class="btn btn-secondary mt-3">Quay về trang chủ</a>

</div>
</div>

<script>
const quiz = [
 {q:"Sản phẩm nào sau đây thường được đan thủ công từ lá buông để bảo vệ mặt bàn?", options:["Lót ly (đế lót ly)","Khăn trải bàn nilon","Thớt nhựa"], answer:0},
 {q:"Sử dụng túi xách làm từ lá buông mang lại lợi ích gì cho môi trường?", options:["Gây ô nhiễm đất","Phân hủy sinh học tự nhiên","Khó phân hủy hơn túi nilon"], answer:1},
 {q:"Giỏ đựng đồ ăn bằng lá buông thường được ưa chuộng vì đặc điểm nào?", options:["Giữ nhiệt cực lâu như hộp xốp","Chứa nhiều hóa chất bảo quản","An toàn cho sức khỏe và thân thiện môi trường"], answer:2},
 {q:"Việc dùng các vật dụng đan lát từ lá buông thay thế đồ nhựa dùng một lần giúp ích gì?", options:["Tốn kém chi phí xử lý rác","Giảm thiểu rác thải nhựa ra môi trường","Làm tăng hiệu ứng nhà kính"], answer:1},
 {q:"Ngoài lót ly và túi xách, lá buông còn được ứng dụng phổ biến để làm gì?", options:["Đan nón (mũ), chiếu và giỏ xách","Sản xuất áo mưa","Chế tạo vỏ điện thoại"], answer:0},
 {q:"Đặc tính tự nhiên nào của lá buông giúp các sản phẩm như giỏ, túi có độ bền cao?", options:["Nhanh tan khi gặp nước","Sợi lá dai, dẻo và chịu lực tốt","Cứng như kim loại, không thể uốn cong"], answer:1},
 {q:"Thay vì dùng hộp xốp dùng một lần, việc dùng giỏ đan từ lá buông để đựng đồ ăn khô mang lại lợi ích gì?", options:["Sinh ra vi nhựa khi sử dụng", "An toàn cho sức khỏe và dễ dàng phân hủy sinh học", "Làm đồ ăn nhanh hỏng hơn"], answer:1},
 {q:"Khi giỏ đựng đồ ăn từ lá buông cũ hỏng, chúng ta có thể xử lý thế nào để bảo vệ môi trường?", options:["Đốt tạo khí độc","Vứt xuống cống rãnh","Ủ làm phân bón hữu cơ (compost)"], answer:2},
 {q:"Xu hướng sử dụng túi xách lá buông trong thời trang hiện nay thể hiện điều gì?", options:["Phong cách sống xanh và trân trọng nghề thủ công","Sự lãng phí tài nguyên thiên nhiên","Thiếu tính thẩm mỹ và lạc hậu"], answer:0},
 {q:"Để các sản phẩm từ lá buông (như giỏ, túi) bền đẹp lâu hơn, người dùng nên bảo quản thế nào?", options:["Ngâm trong nước thường xuyên","Để nơi khô ráo, thoáng mát và tránh ẩm mốc","Phơi dưới nắng gắt liên tục nhiều ngày"], answer:1}
];

let current=0, score=0, timer, timeLeft=30, player="";

function startQuiz(){
    player=document.getElementById("playerName").value||"Người chơi";
    document.getElementById("startBox").style.display="none";
    document.getElementById("quizArea").style.display="block";
    loadQuestion();
}

function loadQuestion(){
    const q=quiz[current];
    document.getElementById("progress").innerText=`Câu ${current+1}/10`;
    const qBox=document.getElementById("questionBox");
    const oBox=document.getElementById("optionsBox");
    qBox.className="fade-slide";
    oBox.className="fade-slide";
    qBox.innerHTML=`<p>${q.q}</p>`;
    oBox.innerHTML="";

    q.options.forEach((opt,i)=>{
        const div=document.createElement("div");
        div.className="option";
        div.innerText=opt;
        // Sửa hàm onClick để chặn click nhiều lần
        div.onclick=function() { selectAnswer(div,i); };
        oBox.appendChild(div);
    });

    startTimer();
}

function startTimer(){
    timeLeft=30; // Chỉnh thời gian đếm ngược về 30s
    document.getElementById("time").innerText=timeLeft;
    timer=setInterval(()=>{
        timeLeft--;
        document.getElementById("time").innerText=timeLeft;
        if(timeLeft<=0){
            clearInterval(timer);
            autoWrong();
        }
    },1000);
}

function autoWrong(){
    const correctIndex=quiz[current].answer;
    const options=document.querySelectorAll(".option");
    options.forEach(o=>o.onclick=null);
    options[correctIndex].classList.add("correct");
    setTimeout(nextQuestion, 2000); // Tự động chuyển câu sau 2 giây
}

function selectAnswer(el,index){
    clearInterval(timer);
    const correctIndex=quiz[current].answer;
    const options=document.querySelectorAll(".option");
    options.forEach(o=>o.onclick=null);

    if(index===correctIndex){
        el.classList.add("correct");
        score++;
    }else{
        el.classList.add("wrong");
        options[correctIndex].classList.add("correct");
    }

    setTimeout(nextQuestion, 2000); // Chuyển sang câu sau 2 giây để người chơi kịp nhìn đáp án
}

function nextQuestion(){
    current++;
    if(current<quiz.length) loadQuestion();
    else showResult();
}

function showResult(){
    document.getElementById("quizArea").style.display="none";
    const box=document.getElementById("resultBox");
    box.style.display="block";
    
    let message = "";
    if(score === 10) message = "Tuyệt vời! Bạn là chuyên gia về lối sống xanh!";
    else if(score >= 5) message = "Làm tốt lắm! Bạn có kiến thức rất tốt về sản phẩm tự nhiên.";
    else message = "Cố gắng lên! Hãy tìm hiểu thêm về các sản phẩm thân thiện với môi trường nhé.";

    box.innerHTML=`<strong>${player}</strong>, bạn đã hoàn thành Quiz!<br>Điểm của bạn: <strong>${score}/10</strong>.<br><em>${message}</em>`;
}
</script>
</body>
</html>
