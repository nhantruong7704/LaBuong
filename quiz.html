<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<title>Quiz Lá Buông & Thiên Nhiên</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f8f5f0; }
.quiz-box{
    max-width:720px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    overflow:hidden;
}
.fade-slide{ animation: fadeSlide 0.4s ease; }
@keyframes fadeSlide{
    from{opacity:0; transform:translateX(20px);}
    to{opacity:1; transform:translateX(0);}
}
.option{
    border:1px solid #ddd;
    padding:10px 15px;
    border-radius:8px;
    margin-bottom:10px;
    cursor:pointer;
    transition:0.2s;
}
.option:hover{background:#f1f1f1;}
.correct{background:#d4edda;border-color:#28a745;color:#155724;}
.wrong{background:#f8d7da;border-color:#dc3545;color:#721c24;}
.timer{font-weight:600;color:#dc3545;}
.result-box{display:none;}
</style>
</head>

<body>
<div class="container my-5">
<div class="quiz-box text-center">

<h2 class="mb-3">Quiz Lá Buông & Thiên Nhiên</h2>

<div id="startBox">
    <input id="playerName" class="form-control mb-3" placeholder="Nhập tên của bạn..." />
    <button class="btn btn-success" onclick="startQuiz()">Bắt đầu làm quiz</button>
</div>

<div id="quizArea" style="display:none;">
    <div class="d-flex justify-content-between">
        <div id="progress"></div>
        <div>Thời gian: <span class="timer" id="time">10</span>s</div>
    </div>
    <div id="questionBox" class="mt-3"></div>
    <div id="optionsBox" class="mt-3"></div>
</div>

<div id="resultBox" class="result-box mt-4 alert alert-info"></div>

<a href="index.html" class="btn btn-secondary mt-3">Quay về trang chủ</a>

</div>
</div>

<script>
const quiz = [
 {q:"Lá buông là nguyên liệu chính để làm gì?", options:["Đồ nhựa","Sản phẩm thủ công","Kim loại"], answer:1},
 {q:"Lá buông có đặc điểm nổi bật nào?", options:["Nhẹ và thân thiện môi trường","Nặng như đá","Dễ tan"], answer:0},
 {q:"Sản phẩm từ lá buông làm bằng cách nào?", options:["Ép nhựa","Đan thủ công","In 3D"], answer:1},
 {q:"Vì sao nên dùng sản phẩm tự nhiên?", options:["Giảm rác thải","Tốn tiền hơn","Không bền"], answer:0},
 {q:"Lá buông khô có tính chất gì?", options:["Dễ mục","Bền và dẻo","Cứng như thép"], answer:1},
 {q:"Thủ công giúp gì?", options:["Gây ô nhiễm","Bảo tồn nghề","Không giá trị"], answer:0},
 {q:"Chất liệu tự nhiên giúp?", options:["Tăng rác","Không ảnh hưởng","Giảm nhựa"], answer:0},
 {q:"Phong cách phù hợp?", options:["Hiện đại tối giản","Công nghiệp","Điện tử"], answer:0},
 {q:"Dùng đồ tự nhiên thể hiện?", options:["Không quan tâm","Ý thức môi trường","Theo trend"], answer:0},
 {q:"Lá buông mang lại?", options:["Ô nhiễm","Vẻ đẹp mộc mạc","Rác nhựa"], answer:0}
];

let current=0, score=0, timer, timeLeft=10, player="";

function startQuiz(){
    player=document.getElementById("playerName").value||"Người chơi";
    document.getElementById("startBox").style.display="none";
    document.getElementById("quizArea").style.display="block";
    loadQuestion();
}

function loadQuestion(){
    const q=quiz[current];
    document.getElementById("progress").innerText=`Câu ${current+1}/10`;
    const qBox=document.getElementById("questionBox");
    const oBox=document.getElementById("optionsBox");
    qBox.className="fade-slide";
    oBox.className="fade-slide";
    qBox.innerHTML=`<p>${q.q}</p>`;
    oBox.innerHTML="";

    q.options.forEach((opt,i)=>{
        const div=document.createElement("div");
        div.className="option";
        div.innerText=opt;
        div.onclick=()=>selectAnswer(div,i);
        oBox.appendChild(div);
    });

    startTimer();
}

function startTimer(){
    timeLeft=10;
    document.getElementById("time").innerText=timeLeft;
    timer=setInterval(()=>{
        timeLeft--;
        document.getElementById("time").innerText=timeLeft;
        if(timeLeft<=0){
            clearInterval(timer);
            autoWrong();
        }
    },1000);
}

function autoWrong(){
    const correctIndex=quiz[current].answer;
    const options=document.querySelectorAll(".option");
    options.forEach(o=>o.onclick=null);
    options[correctIndex].classList.add("correct");
    setTimeout(nextQuestion,2000);
}

function selectAnswer(el,index){
    clearInterval(timer);
    const correctIndex=quiz[current].answer;
    const options=document.querySelectorAll(".option");
    options.forEach(o=>o.onclick=null);

    if(index===correctIndex){
        el.classList.add("correct");
        score++;
    }else{
        el.classList.add("wrong");
        options[correctIndex].classList.add("correct");
    }

    setTimeout(nextQuestion,3000);
}

function nextQuestion(){
    current++;
    if(current<quiz.length) loadQuestion();
    else showResult();
}

function showResult(){
    document.getElementById("quizArea").style.display="none";
    const box=document.getElementById("resultBox");
    box.style.display="block";
    box.innerHTML=`${player}, bạn được ${score}/10 điểm.`;
}
</script>
</body>
</html>
